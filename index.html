      <h1>Female Scholars in Conflict Studies</h1>
      <p class="subtitle">
        A workshop and community-building platform supporting scholars working on conflict, fieldwork, and difficult research environments. The initiative creates a space for methodological reflection, mutual support, and the sharing of transferable skills among early-career researchers.
      </p>

      <!-- Replace the file path below with your own image -->

  <main>
    <div class="container">
      <section id="about">
        <h2>About the Project</h2>
        <p>
          Female Scholars in Conflict Studies began in July 2025 as a researcher-led initiative supported by SOAS research funding. The project is centred on research methods, but its broader purpose is to cultivate an academic community in which scholars can discuss fieldwork experiences, ethical dilemmas, emotional challenges, and practical strategies in a supportive environment.
        </p>
        <p>
          The platform is especially concerned with how scholars working in conflict-affected and politically sensitive settings navigate access, safety, positionality, and care. It also aims to identify transferable skills and shared lessons that may benefit other early-career scholars.
        </p>
      </section>

      <section>
        <h2>Core Themes</h2>
        <div class="grid">
          <div class="card">
            <h3>Methodological Reflection</h3>
            <p>Creating space to discuss access, ethics, positionality, and the emotional dimensions of fieldwork.</p>
          </div>
          <div class="card">
            <h3>Community Building</h3>
            <p>Developing a supportive network in which participants feel able to share experiences openly and safely.</p>
          </div>
          <div class="card">
            <h3>Transferable Skills</h3>
            <p>Highlighting research practices, coping strategies, and practical knowledge that can support early-career scholars.</p>
          </div>
        </div>
      </section>

      <section id="events">
        <h2>Selected Events</h2>
        <div class="grid">
          <div class="card">
            <h3>Research Methods Reflections</h3>
            <p class="meta">SOAS | July 2025</p>
            <p>An early workshop that set out the project’s core concerns around methods, experience-sharing, and scholarly community.</p>
          </div>
          <div class="card">
            <h3>Doing Ethnography in Hostile Contexts</h3>
            <p class="meta">SOAS | February 2026</p>
            <p>A conversation with Professor Ching Kwan Lee on fieldwork, intellectual responsibility, and difficult research environments.</p>
          </div>
          <div class="card">
            <h3>Researching the Digital Illicit Economy</h3>
            <p class="meta">SOAS | March 2026</p>
            <p>Workshop on methods, ethics, and access in the study of digital illicit economies and conflict settings.</p>
          </div>
        </div>
      </section>
